name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pip-audit

      # Run tests (placeholder)
      - name: Run tests
        run: echo "No tests yet"
      - name: Dependency Scan
        run: pip-audit --ignore-vuln CVE-2026-4539
      
      # Dependency scan
      - name: Dependency Scan
        run: pip-audit

      # Build Docker image
      - name: Build Docker Image
        run: docker build -t mohakkataria007/devsecops-app:latest .

      # Run Trivy scan on image BEFORE push
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "mohakkataria007/devsecops-app:latest"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
          ignore-unfixed: true

      # Login to DockerHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Push Docker image
      - name: Push Docker Image
        run: docker push mohakkataria007/devsecops-app:latest
