name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r app/requirements.txt pip-audit

      - name: Run tests
        run: echo "No tests yet"  # can add pytest later

      - name: Dependency Scan
        run: pip-audit

      - name: Build Docker Image
        run: docker build -t yourdockerhubusername/devsecops-app .

      - name: Install Trivy
        run: |
          sudo apt-get install wget -y
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.45.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.45.0_Linux-64bit.deb

      - name: Scan Docker Image
        run: trivy image yourdockerhubusername/devsecops-app
