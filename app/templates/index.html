<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevSecOps Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }
        header {
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            background: #1e293b;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .title {
            font-size: 18px;
            margin-bottom: 10px;
            color: #94a3b8;
        }
        .status {
            font-size: 22px;
            font-weight: bold;
        }
        footer {
            text-align: center;
            padding: 10px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<header>
DevSecOps CI/CD Dashboard
</header>

<div class="container">
    <div class="card">
        <div class="title">Pipeline Status</div>
        <div class="status">{{ data.pipeline }}</div>
    </div>

    <div class="card">
        <div class="title">Build Status</div>
        <div class="status">{{ data.build }}</div>
    </div>

    <div class="card">
        <div class="title">Security Scan</div>
        <div class="status">{{ data.security }}</div>
    </div>

    <div class="card">
        <div class="title">Deployment</div>
        <div class="status">{{ data.deployment }}</div>
    </div>
</div>

<footer>
Built with Flask | Docker | GitHub Actions | Trivy 
</footer>

</body>
</html>
